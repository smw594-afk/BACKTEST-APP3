<!DOCTYPE html>
<html id="docHtml">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
  <title>V-TOTAL MASTER2</title>

  <script>
    function detectLayout() {
      const g = document.getElementById('mainGrid');
      // ⭐️ [커버 모드 완전 제거] 더 이상 특정 해상도에서 레이아웃을 강제로 압축하지 않습니다.
      if (document.documentElement.classList.contains('is-cover')) {
        document.documentElement.classList.remove('is-cover');
        updateMobileButtonText(false);
      }
      if (g) g.classList.remove('force-3-col', 'force-2-col');
    }
    function updateMobileButtonText(isMobile) {
      const btnInstant = document.getElementById('btnInstant');
      const btnRun = document.getElementById('runBtn');
      const btnSettings = document.getElementById('btnSettings');
      const btnStats = document.getElementById('btnStatsShow');

      if (btnInstant) btnInstant.innerHTML = isMobile ? '<span id="icoInstant">⚡</span>' : '<span id="icoInstant">⚡</span><span class="btn-text">주문표</span>';
      if (btnRun) btnRun.innerHTML = isMobile ? '<span id="icoRun">🚀</span>' : '<span id="icoRun">🚀</span><span class="btn-text">백테스트</span>';
      if (btnSettings) btnSettings.innerHTML = isMobile ? '⚙️' : '⚙️<span class="btn-text">설정</span>';
      if (btnStats) btnStats.innerHTML = isMobile ? '<span id="icoStatsShow">📄</span>' : '<span id="icoStatsShow">📄</span><span class="btn-text">성과지표</span>';
    }

    window.addEventListener('resize', () => { detectLayout(); if (window.myChart) window.myChart.resize(); });
    window.addEventListener('load', detectLayout);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loginScreen" class="login-container hidden">
    <div class="login-inner">
      <div class="login-title">📄 V-TOTAL MASTER2 <span id="loginVersion"
          style="font-size:12px; opacity:0.5; font-weight:400;"></span></div>
      <p style="font-size:11px; color:#64748b; margin-bottom:15px;">아이디/비번이 시트에 자동 등록됩니다.</p>
      <input type="text" id="loginId" class="login-input" placeholder="아이디 입력">
      <input type="password" id="loginPw" class="login-input" placeholder="비밀번호 입력"
        onkeypress="if(event.key==='Enter') handleLogin()">
      <button id="loginBtn" onclick="handleLogin()" class="login-btn">로그인</button>
    </div>
  </div>

  <div class="top-bar hidden" id="topBar">
    <div class="top-left">
      <div id="ledLamp" class="led-lamp"></div>
      <div class="user-id-box" id="userDisplayHeader" onclick="confirmLogout()" title="클릭하여 로그아웃">로딩중...</div>
    </div>
    <div class="top-right">
      <button id="btnStatsShow" class="top-icon-btn" title="성과지표 모드 (길게 누르면 강제갱신)"><span
          id="icoStatsShow">📄</span><span class="btn-text">성과지표</span></button>
      <button id="btnInstant" class="top-icon-btn" title="주문표 UI (길게 누르면 갱신)"><span id="icoInstant">⚡</span><span
          class="btn-text">주문표</span></button>
      <button id="btnSettings" class="top-icon-btn" onclick="toggleSettings()" title="설정">⚙️<span
          class="btn-text">설정</span></button>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div class="settings-overlay" id="settingsScreen" onclick="if(event.target === this) toggleSettings()">
    <div class="settings-modal">
      <h3>⚙️ 투자 설정</h3>
      <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px;" id="settingsTabContainer">
        <button id="tabSlot1" onclick="switchSettingsTab(1)" class="btn-action"
          style="flex:1 1 30%; height:32px; font-size:11px; background:linear-gradient(135deg, #6366f1, #4f46e5);">투자법
          1</button>
        <button id="tabSlot2" onclick="switchSettingsTab(2)" class="btn-action"
          style="flex:1 1 30%; height:32px; font-size:11px; background:rgba(51,65,85,0.8);">투자법 2</button>
        <button id="tabSlot3" onclick="switchSettingsTab(3)" class="btn-action"
          style="flex:1 1 30%; height:32px; font-size:11px; background:rgba(51,65,85,0.8);">투자법 3</button>
        <button id="tabSlot4" onclick="switchSettingsTab(4)" class="btn-action"
          style="flex:1 1 30%; height:32px; font-size:11px; background:rgba(51,65,85,0.8);">투자법 4</button>
        <button id="tabSlot5" onclick="switchSettingsTab(5)" class="btn-action"
          style="flex:1 1 30%; height:32px; font-size:11px; background:rgba(51,65,85,0.8);">투자법 5</button>
        <button id="tabSlot6" onclick="switchSettingsTab(6)" class="btn-action"
          style="flex:1 1 30%; height:32px; font-size:11px; background:rgba(51,65,85,0.8);">투자법 6</button>
      </div>
      <div id="alwaysVisibleInputs">
        <div class="input-group"><label>티커</label><input type="text" id="ticker" onchange="triggerOptimisticSave()">
        </div>
        <div class="input-group"><label>시작일</label><input type="date" id="startDate" onchange="triggerOptimisticSave()">
        </div>
        <div class="input-group"><label>종료일</label><input type="date" id="endDate" onchange="triggerOptimisticSave()">
        </div>
        <div class="input-group">
          <label>투자법</label>
          <select id="strategySelect" onchange="handleStrategyChange(this.value)">
            <option value="">-- 선택 안 함 --</option>
            <option value="1M">1M</option>
            <option value="2M3D1-1P">2M3D1-1P</option>
            <option value="2M3D2(1.0)">2M3D2(1.0)</option>
            <option value="2M3D2(1.2)">2M3D2(1.2)</option>
            <option value="2M3D2(2.0)">2M3D2(2.0)</option>
            <option value="2M3D2(2.1)">2M3D2(2.1)</option>
          </select>
        </div>
        <div class="input-group"><label>초기자산($)</label><input type="text" id="initialCash"
            onchange="triggerOptimisticSave()"></div>
        <div class="input-group"><label>갱신금($)</label><input type="text" id="renewCash"
            onchange="triggerOptimisticSave()"></div>
        <div class="input-group"><label>수수료(%)</label><input type="number" id="fBase" step="any"
            onchange="triggerOptimisticSave()"></div>
        <div class="input-group"><label>SEC(%)</label><input type="number" id="fSec" step="any"
            onchange="triggerOptimisticSave()"></div>
        <div class="input-group">
          <label>기본 통화</label>
          <select id="defaultCurrency" onchange="updateDefaultCurrency(this.value)"
            style="background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); color: #fbbf24; font-weight: bold;">
            <option value="USD">달러(USD)</option>
            <option value="KRW">원화(KRW)</option>
          </select>
        </div>
      </div>

      <div id="settingsStatusPanel" class="status-panel">
        <div class="status-panel-title"><span>📡 실시간 운용 현황</span></div>
        <div class="status-row"><span>날짜</span><span id="statDate">-</span></div>
        <div class="status-row"><span>현재 총자산</span><span id="statTotal">-</span></div>
        <div class="status-row"><span>현재 갱신금</span><span id="statRenew">-</span></div>
        <div class="status-row"><span>현재 원금</span><span id="statPrincipal">-</span></div>
      </div>

      <div style="margin-top:20px; display:flex; flex-direction:column; gap:8px;">
        <style>
          .btn-settings-row {
            height: 45px;
            font-size: 13px;
            font-weight: 600;
          }
        </style>
        <button id="runBtnSettings" class="btn-action btn-settings-row" onclick="runEngine()"
          style="background: linear-gradient(135deg, #f59e0b, #d97706);">🚀 백테스트 실행 (Backtest)</button>
        <button id="btnSyncSheet" class="btn-action btn-settings-row" onclick="restoreRealAccountMode()"
          style="background: #475569;">📥 시트값 불러오기 (Sync)</button>
        <button class="btn-action btn-settings-row" onclick="handleDeposit()"
          style="background: linear-gradient(135deg, #3b82f6, #2563eb);">💰 실전 증액하기 (입금)</button>
        <button id="btnSaveTop" class="btn-action btn-save btn-settings-row" onclick="handleSave()"
          style="background: linear-gradient(135deg, #10b981, #059669);">✅ 시트에 반영하기</button>
        <button class="btn-action btn-adv" onclick="toggleSettings()" style="height:35px; opacity:0.7;">설정 닫기</button>
      </div>

      <div
        style="margin-top:15px; display:flex; justify-content:space-between; align-items:center; opacity:0.5; font-size:10px;">
        <span>v<span id="settingsVersion"></span> (Dynamic)</span>
        <button onclick="forceUpdateApp()"
          style="background:none; border:1px solid #666; color:white; border-radius:4px; padding:2px 4px; cursor:pointer;">데이터
          리셋</button>
      </div>
    </div>
  </div>

  <div class="dashboard-grid hidden" id="mainGrid">

    <div class="card panel-order" id="panelOrder">
      <div class="section-header swipe-handler" id="orderHeader">
        <h2 id="orderTitle" style="margin:0; color:var(--primary); cursor:pointer;" onclick="toggleOrderView()"
          title="클릭하여 주문표/보유계좌 전환">⚡ 주문표</h2>
        <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
          <button id="btnExpandOrder" onclick="toggleOrderExpansion()" class="btn-icon-sub" title="주문표 세로 확장">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
            </svg>
          </button>
        </div>
      </div>
      <div id="dualOrderContainer" class="slim-scroll"
        style="display:flex; gap:4px; flex:1; overflow-x:auto; overflow-y:hidden; min-height:0;">
      </div>
    </div>

    <div class="card panel-monthly" id="panelMonthly">
      <div class="section-header swipe-handler" id="monthlyHeader">
        <h2 id="periodTitle" class="period-toggle" onclick="togglePeriodView()" title="월별/년별 전환">📅 월별 성과</h2>
        <button id="btnPeriodMode" onclick="togglePeriodDisplayMode()" class="btn-icon-sub" title="차트/테이블 전환"
          style="font-size:20px; display:flex; align-items:center; justify-content:center;">
          <span id="icoPeriodMode">🔢</span>
        </button>
      </div>
      <div id="periodChartContainer" class="slim-scroll"
        style="flex:1; overflow-x:auto; overflow-y:hidden; min-height:0; position:relative;">
        <div id="periodBarChartWrapper" style="height:100%; min-width:100%;">
          <canvas id="periodBarChart"></canvas>
        </div>
      </div>
      <div id="periodTableContainer" class="slim-scroll"
        style="flex:1; overflow:auto; min-height:0; display:none; -webkit-overflow-scrolling:touch;">
        <div style="display:flex; gap:2px; min-height:min-content; min-width:max-content;" id="periodTableFlex">
        </div>
      </div>
    </div>

    <div class="card panel-stats hidden" id="panelStats">
      <div class="section-header">
        <h2 id="statsTitle">📄 성과 지표</h2>
        <div id="statsActionArea" style="margin-left:auto; display:flex; gap:8px;"></div>
      </div>
      <div class="slim-scroll" style="flex:1; overflow-x:auto; overflow-y:hidden; min-height:0; padding:4px 0;">
        <table id="statsTable"
          style="width:100%; border-collapse:collapse; font-size:11px; color:var(--text-white); min-width:500px;">
        </table>
      </div>
    </div>

    <div class="card panel-chart" id="panelChart">
      <div class="section-header">
        <h2 id="chartTitle" onclick="toggleChartView()" title="클릭하여 그래프 전환 (전체/개별순환)" style="cursor:pointer;">📈 성과추이
        </h2>
        <button id="btnCurrencyToggle" onclick="toggleCurrencyMode()"
          style="margin-left: auto; background: none; color: #fff; border: none; outline: none; padding: 4px; font-size: 11px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-right: 0px; display: flex; align-items: center; justify-content: center; min-width: 40px; box-shadow: none;">
          <img src="https://flagcdn.com/w40/kr.png"
            style="width:16px; height:12px; border-radius:2px; margin-right:5px; flex-shrink:0; box-shadow: 0 0 2px rgba(0,0,0,0.5);">KRW
        </button>
      </div>
      <div class="chart-container" id="chartBox"></div>
    </div>
  </div>

  <div id="quickConfigOverlay" class="settings-overlay" style="display:none; z-index:1100;"
    onclick="if(event.target === this) this.style.display='none'">
    <div class="settings-modal" style="max-width:340px; padding:20px;">
      <h3 style="margin-bottom:15px;">🚀 백테스트 통합 설정</h3>
      <div id="quickConfigForm" style="display:flex; flex-direction:column; gap:8px;">
        <div
          style="background:rgba(255,255,255,0.03); padding:8px; border-radius:8px; margin-bottom:4px; display:flex; flex-direction:column; gap:6px; border:1px solid rgba(255,255,255,0.05); max-height:180px; overflow-y:auto;"
          class="slim-scroll">
          <div class="input-group"><label>투자법 1</label>
            <select id="qStrat1" style="border-color:#6366f1;">
              <option value="">없음</option>
              <option value="1M" selected>1M</option>
              <option value="2M3D1-1P">2M3D1-1P</option>
              <option value="2M3D2(1.0)">2M3D2(1.0)</option>
              <option value="2M3D2(1.2)">2M3D2(1.2)</option>
              <option value="2M3D2(2.0)">2M3D2(2.0)</option>
              <option value="2M3D2(2.1)">2M3D2(2.1)</option>
            </select>
          </div>
          <div class="input-group"><label>투자법 2</label>
            <select id="qStrat2" style="border-color:#10b981;">
              <option value="">없음</option>
              <option value="1M">1M</option>
              <option value="2M3D1-1P">2M3D1-1P</option>
              <option value="2M3D2(1.0)" selected>2M3D2(1.0)</option>
              <option value="2M3D2(1.2)">2M3D2(1.2)</option>
              <option value="2M3D2(2.0)">2M3D2(2.0)</option>
              <option value="2M3D2(2.1)">2M3D2(2.1)</option>
            </select>
          </div>
          <div class="input-group"><label>투자법 3</label>
            <select id="qStrat3" style="border-color:#fbbf24;">
              <option value="">없음</option>
              <option value="1M">1M</option>
              <option value="2M3D1-1P">2M3D1-1P</option>
              <option value="2M3D2(1.0)">2M3D2(1.0)</option>
              <option value="2M3D2(1.2)" selected>2M3D2(1.2)</option>
              <option value="2M3D2(2.0)">2M3D2(2.0)</option>
              <option value="2M3D2(2.1)">2M3D2(2.1)</option>
            </select>
          </div>
          <div class="input-group"><label>투자법 4</label>
            <select id="qStrat4" style="border-color:#f43f5e;">
              <option value="">없음</option>
              <option value="1M">1M</option>
              <option value="2M3D1-1P" selected>2M3D1-1P</option>
              <option value="2M3D2(1.0)">2M3D2(1.0)</option>
              <option value="2M3D2(1.2)">2M3D2(1.2)</option>
              <option value="2M3D2(2.0)">2M3D2(2.0)</option>
              <option value="2M3D2(2.1)">2M3D2(2.1)</option>
            </select>
          </div>
          <div class="input-group"><label>투자법 5</label>
            <select id="qStrat5" style="border-color:#8b5cf6;">
              <option value="">없음</option>
              <option value="1M">1M</option>
              <option value="2M3D1-1P">2M3D1-1P</option>
              <option value="2M3D2(1.0)">2M3D2(1.0)</option>
              <option value="2M3D2(1.2)">2M3D2(1.2)</option>
              <option value="2M3D2(2.0)" selected>2M3D2(2.0)</option>
              <option value="2M3D2(2.1)">2M3D2(2.1)</option>
            </select>
          </div>
          <div class="input-group"><label>투자법 6</label>
            <select id="qStrat6" style="border-color:#06b6d4;">
              <option value="">없음</option>
              <option value="1M">1M</option>
              <option value="2M3D1-1P">2M3D1-1P</option>
              <option value="2M3D2(1.0)">2M3D2(1.0)</option>
              <option value="2M3D2(1.2)">2M3D2(1.2)</option>
              <option value="2M3D2(2.0)">2M3D2(2.0)</option>
              <option value="2M3D2(2.1)" selected>2M3D2(2.1)</option>
            </select>
          </div>
        </div>

        <div class="input-group"><label>티커</label><input type="text" id="qTicker" value="SOXL"></div>
        <div class="input-group"><label>시작일</label><input type="date" id="qStartDate"></div>
        <div class="input-group"><label>종료일</label><input type="date" id="qEndDate"></div>

        <div class="input-group"><label>초기자산</label><input type="text" id="qInitialCash"></div>
        <div class="input-group"><label>갱신금</label><input type="text" id="qRenewCash"></div>
        <div class="input-group"><label>수수료(%)</label><input type="number" id="qFBase" value="0.08" step="any"></div>
        <div class="input-group"><label>SEC(%)</label><input type="number" id="qFSec" value="0.00278" step="any"></div>

        <div style="margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.1);">
          <input type="text" id="qBatchRaw" placeholder="시작일 종료일 초기자산 갱신금 붙여넣기"
            oninput="handleQuickBatchParse(this.value)"
            style="width:100% !important; height:30px; border-color:var(--primary); background:rgba(99,102,241,0.1);">
        </div>
      </div>

      <div style="margin-top:20px; display:flex; gap:8px;">
        <button class="btn-action" onclick="applyQuickConfig()"
          style="flex:2; background:linear-gradient(135deg, #f59e0b, #d97706); height:45px;">설정 및 백테스트 실행</button>
        <button class="btn-action" onclick="document.getElementById('quickConfigOverlay').style.display='none'"
          style="flex:1; background:#475569; height:45px;">취소</button>
      </div>
    </div>
  </div>

  <script src="engine.js" defer></script>
  <script src="script.js" defer></script>

</body>

</html>
